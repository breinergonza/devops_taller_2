# =============================================================================
# Configuración del agente Python de New Relic
# -----------------------------------------------------------------------------
# Mantengo este archivo versionado SIN la license key.
# La license la inyecto siempre por variable de entorno NEW_RELIC_LICENSE_KEY:
#   - En local: la leo del archivo .env.local (cargado por docker-compose).
#   - En AWS:   la leo del SSM Parameter Store /taller4/NEW_RELIC_LICENSE_KEY
#               vía el bloque "secrets" del task-def.json de Fargate.
#
# El nombre de la app también lo sobrescribo por entorno con NEW_RELIC_APP_NAME
# (definido en .env.local localmente y en task-def.json en cloud), y selecciono
# la sección [newrelic:<env>] con NEW_RELIC_ENVIRONMENT.
# =============================================================================

[newrelic]

# Dejo el app_name como fallback; en runtime lo pisa NEW_RELIC_APP_NAME.
app_name = devops-taller-4-flask

# Habilito el monitoreo (el agente envía datos a New Relic).
monitor_mode = true

# Logs del propio agente: los mando a stdout para que CloudWatch/Docker
# los capture sin necesidad de archivos extra dentro del contenedor.
log_file = stdout
log_level = info

# SSL siempre activo (es el default desde hace varias versiones, lo dejo explícito).
ssl = true

# Tiempo máximo que espero al cerrar la app para que el agente vacíe su buffer.
shutdown_timeout = 2.5

# -----------------------------------------------------------------------------
# Tracing distribuido: necesario para correlacionar requests entre servicios
# y para que las trazas se enlacen con logs y errores.
# -----------------------------------------------------------------------------
distributed_tracing.enabled = true
cross_application_tracer.enabled = false

# -----------------------------------------------------------------------------
# Transaction tracer: capturo trazas detalladas de las transacciones lentas.
# Esto es lo que me da "Tiempo de respuesta de los servicios" y "Tiempo de
# respuesta de la DB" que pide la Entrega 4.
# -----------------------------------------------------------------------------
transaction_tracer.enabled = true
transaction_tracer.transaction_threshold = apdex_f
transaction_tracer.record_sql = obfuscated
transaction_tracer.stack_trace_threshold = 0.5
transaction_tracer.explain_enabled = true
transaction_tracer.explain_threshold = 0.5

# -----------------------------------------------------------------------------
# Error collector: para el punto "Registro de errores en los servicios".
# -----------------------------------------------------------------------------
error_collector.enabled = true
error_collector.ignore_status_codes = 404

# -----------------------------------------------------------------------------
# Browser monitoring: lo dejo desactivado porque este servicio es solo API.
# -----------------------------------------------------------------------------
browser_monitoring.auto_instrument = false

# -----------------------------------------------------------------------------
# Thread profiler: lo habilito para análisis bajo carga (stress tests).
# -----------------------------------------------------------------------------
thread_profiler.enabled = true

# -----------------------------------------------------------------------------
# Application logging: reenvío los logs de la app a New Relic Logs.
# Así puedo correlacionar logs con transacciones desde la misma UI.
# -----------------------------------------------------------------------------
application_logging.enabled = true
application_logging.forwarding.enabled = true
application_logging.forwarding.max_samples_stored = 10000
application_logging.metrics.enabled = true
application_logging.local_decorating.enabled = true

# =============================================================================
# Secciones por entorno: el agente elige una según NEW_RELIC_ENVIRONMENT.
# =============================================================================

[newrelic:development]
# En dev quiero más verbosidad para depurar la integración inicial.
monitor_mode = true
log_level = info
app_name = devops-taller-4-flask (development)

[newrelic:staging]
monitor_mode = true
log_level = info
app_name = devops-taller-4-flask (staging)

[newrelic:production]
# En producción bajo el log_level para no inflar el costo de logs en NR.
monitor_mode = true
log_level = warning
app_name = devops-taller-4-flask (production)
