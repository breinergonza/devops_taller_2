version: 0.2

env:
  variables:
    ARTIFACT_NAME: "blacklist-service"
    S3_BUCKET: "taller-2-artifacts"
  parameter-store:
    DATABASE_URI: /taller2/database-uri
    JWT_SECRET_KEY: /taller2/jwt-secret-key
    STATIC_BEARER: /taller2/static-bearer

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "=== INSTALL PHASE ==="
      - python --version
      - pip install --upgrade pip
      - pip install -r requirements.txt

  pre_build:
    commands:
      - echo "=== PRE_BUILD PHASE: Running Tests ==="
      - mkdir -p reports
      - pytest -v --junitxml=reports/junit.xml --cov=src --cov-report=xml:reports/coverage.xml --cov-report=html:reports/htmlcov --cov-report=term-missing

  build:
    commands:
      - echo "=== BUILD PHASE: Creating Artifact ==="
      - export BUILD_ID=${CODEBUILD_BUILD_NUMBER:-local}
      - export ARTIFACT_FILE="build/${ARTIFACT_NAME}-${BUILD_ID}.zip"
      - mkdir -p build
      - zip -r ${ARTIFACT_FILE} . -x "venv/*" "tests/*" ".git/*" ".github/*" "node_modules/*" ".pytest_cache/*" "__pycache__/*" "*.pyc" ".coverage*" "build/*" "reports/*" ".DS_Store" ".env" ".env.local"
      - ls -lh build/

  post_build:
    commands:
      - echo "=== POST_BUILD PHASE: Uploading to S3 ==="
      - export BUILD_ID=${CODEBUILD_BUILD_NUMBER:-local}
      - export ARTIFACT_FILE="build/${ARTIFACT_NAME}-${BUILD_ID}.zip"
      - aws s3 cp ${ARTIFACT_FILE} s3://${S3_BUCKET}/builds/${CODEBUILD_BUILD_ID}/ --region us-east-1
      - echo "Artifact uploaded to S3 successfully"

reports:
  junit_report:
    files:
      - reports/junit.xml
    file-format: JUNITXML
  coverage_report:
    files:
      - reports/coverage.xml
    file-format: COBERTURAXML

artifacts:
  files:
    - build/*.zip
  name: BlacklistServiceBuild
  discard-paths: yes

cache:
  paths:
    - /root/.cache/pip/**/*
