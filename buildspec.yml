version: 0.2

env:
  variables:
    AWS_ACCOUNT_ID: "820905681257"
    AWS_DEFAULT_REGION: "us-east-1"
    IMAGE_REPO_NAME: "blacklist-service"
    CONTAINER_NAME: "blacklist-container"
  parameter-store:
    DATABASE_URI: /taller2/database-uri
    JWT_SECRET_KEY: /taller2/jwt-secret-key
    STATIC_BEARER: /taller2/static-bearer

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "===> install phase"
      - python -m pip install --upgrade pip
      - pip install -r requirements.txt

  pre_build:
    commands:
      - echo "===> pre_build phase - running unit tests"
      - mkdir -p reports
      - pytest -v --junitxml=reports/junit.xml --cov=src --cov-report=xml:reports/coverage.xml --cov-report=html:reports/htmlcov --cov-report=term-missing
      - echo "===> tests passed! Now authenticating with ECR..."
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - export REPOSITORY_URI="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME"
      - export COMMIT_HASH="$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)"
      - export IMAGE_TAG="${COMMIT_HASH:-latest}"
      - echo "Image will be pushed as $REPOSITORY_URI/$IMAGE_TAG"

  build:
    commands:
      - echo "===> build phase - building Docker image for blacklist-service"
      - docker build -t $REPOSITORY_URI:$IMAGE_TAG .
      - docker tag $REPOSITORY_URI:$IMAGE_TAG $REPOSITORY_URI:latest
      - echo "===> Docker image built successfully"

  post_build:
    commands:
      - echo "===> post_build phase - pushing image to ECR"
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - docker push $REPOSITORY_URI:latest
      - echo "===> Image pushed to ECR successfully"
      - echo "===> creating imagedefinitions.json for CodeDeploy/ECS"
      - printf '[{"name":"%s","imageUri":"%s"}]' $CONTAINER_NAME $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json
      - cat imagedefinitions.json

reports:
  pytest_reports:
    files:
      - reports/junit.xml
    file-format: JUNITXML
  coverage_report:
    files:
      - reports/coverage.xml
    file-format: COBERTURAXML

artifacts:
  files:
    - imagedefinitions.json
    - appspec.yaml
    - scripts/**/*
  name: BlacklistServiceDockerBuild

cache:
  paths:
    - /root/.cache/pip/**/*
